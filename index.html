<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anderson Spirit</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://sandbox.web.squarecdn.com/v1/square.js"></script>
    <style>
        :root { --bg-body: #DFD5C9; --bg-card: #F5F1E7; --text-main: #232A31; --text-light: #646C73; --accent-rose: #A44C46; --border-soft: #D1C7BB; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); padding: 40px 20px; line-height: 1.6; }
        .container { max-width: 850px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 42px; margin-bottom: 20px; font-weight: 700; }
        h1 span { font-style: italic; color: var(--accent-rose); }
        .notice-box { border-top: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft); padding: 20px 40px; margin: 10px 0; text-align: center; }
        .highlight-text { font-weight: 700; color: var(--text-main); font-size: 14.5px; text-transform: uppercase; letter-spacing: 1px; margin: 5px 0; }
        section { background: var(--bg-card); padding: 40px; border-radius: 20px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        .product-card { display: flex; border-bottom: 1px solid var(--border-soft); padding: 20px 0; align-items: center; }
        .product-img { width: 95px; height: 95px; background: #DFD5C9; border-radius: 14px; margin-right: 25px; overflow: hidden; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .product-info { flex-grow: 1; }
        .product-title { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 600; }
        .product-desc { font-size: 14px; color: var(--text-light); margin: 4px 0; }
        .product-price { font-size: 16px; color: var(--accent-rose); font-weight: 700; margin-top: 5px; }
        .quantity-selector { display: flex; align-items: center; background: #DFD5C9; border-radius: 30px; padding: 4px 6px; }
        .quantity-btn { width: 32px; height: 32px; border: none; background: none; cursor: pointer; font-size: 20px; }
        .quantity-input { width: 36px; text-align: center; border: none; background: none; font-weight: 700; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Anderson <span>Spirit</span></h1>
        <div class="notice-box">
            <p class="highlight-text">📌 Orders close every Wednesday at 10:00 PM.</p>
            <p class="highlight-text">📦 Pick up at the school office on Fridays after school at 2:45 PM.</p>
        </div>
    </header>
    <section>
        <div id="product-container">載入中...</div>
    </section>
</div>
<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz1AvO2BObufCfW2ENW5EoTnLaDfhRD60zb1Fl7B79ZX4Mt6uSBIyuRlLWTwmBcUZZV/exec';

    // 處理圖片網址的轉譯器
    function getDriveImage(url) {
        if (url.includes('drive.google.com')) {
            let match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            if (match) return `https://drive.google.com/uc?export=view&id=${match[1]}`;
        }
        return url;
    }

    async function init() {
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            const container = document.getElementById('product-container');
            container.innerHTML = '';
            
            data.products.forEach(p => {
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="product-img"><img src="${getDriveImage(p.image)}" style="width:100%;height:100%;object-fit:cover;"></div>
                    <div class="product-info">
                        <div class="product-title">${p.title}</div>
                        <div class="product-desc">${p.desc}</div>
                        <div class="product-price">$${p.price.toFixed(2)}</div>
                    </div>
                    <div class="quantity-selector">
                        <button class="quantity-btn dec">-</button>
                        <input class="quantity-input" value="0" readonly>
                        <button class="quantity-btn inc">+</button>
                    </div>`;
                container.appendChild(card);
            });
            // 綁定按鈕邏輯
            document.querySelectorAll('.inc').forEach(btn => btn.onclick = () => { btn.previousElementSibling.value++; });
            document.querySelectorAll('.dec').forEach(btn => btn.onclick = () => { if(btn.nextElementSibling.value > 0) btn.nextElementSibling.value--; });
        } catch (e) {
            document.getElementById('product-container').innerText = "載入失敗，請檢查網路或試算表設定。";
        }
    }
    init();
</script>
</body>
</html>
