<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anderson Spirit</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://sandbox.web.squarecdn.com/v1/square.js"></script>
    <style>
        :root {
            /* 🎨 高級精品雜誌風配色 (無反光溫潤版) */
            --bg-body: #DFD5C9;          /* 背景：優雅的燕麥奶茶色 */
            --bg-card: #F5F1E7;          /* 卡片：溫潤的珍珠奶霜色，不刺眼反光 */
            --text-main: #232A31;        /* 文字主色：極深碳藍色，知性且高對比 */
            --text-light: #646C73;       /* 文字副色：深石板灰 */
            --accent-rose: #A44C46;      /* 點綴色：經典深磚紅，亮麗有質感 */
            --border-soft: #D1C7BB;      /* 邊框：柔和的燕麥灰 */
            --shadow-lux: 0 16px 40px rgba(35, 42, 49, 0.08); /* 輕柔立體陰影 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            letter-spacing: 0.3px;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 850px;
            margin: 0 auto;
        }

        /* 標題與頂部設計 */
        header {
            text-align: center;
            margin-bottom: 50px;
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            color: var(--text-main);
            font-size: 42px;
            letter-spacing: 1px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        header h1 span {
            font-style: italic;
            color: var(--accent-rose);
        }

        .notice-box {
            display: inline-block;
            background-color: transparent;
            border-top: 1px solid var(--border-soft);
            border-bottom: 1px solid var(--border-soft);
            padding: 20px 40px;
            margin: 10px 0;
            text-align: center;
        }

        .highlight-text {
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            color: var(--text-main);
            font-size: 14.5px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 8px 0;
        }

        /* 區塊標題 */
        h2 {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            color: var(--text-main);
            margin-bottom: 25px;
            font-weight: 600;
            display: flex;
            align-items: center;
        }

        h2::after {
            content: "";
            flex: 1;
            margin-left: 20px;
            height: 1px;
            background-color: var(--border-soft);
        }

        section {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: var(--shadow-lux);
            margin-bottom: 40px;
            transition: transform 0.3s ease;
        }

        section:hover {
            transform: translateY(-2px);
        }

        /* 表單設計 */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
        }

        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
            section { padding: 25px; }
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input {
            padding: 14px 16px;
            border: 1px solid var(--border-soft);
            background-color: #EFEBE0;
            border-radius: 10px;
            font-size: 15px;
            color: var(--text-main);
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            border-color: var(--text-main);
            background-color: var(--bg-card);
            box-shadow: 0 0 0 4px rgba(35, 42, 49, 0.05);
        }

        /* 商品卡片設計 */
        .product-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .product-card {
            display: flex;
            border: 1px solid transparent;
            border-bottom: 1px solid var(--border-soft);
            padding: 20px 0;
            background: transparent;
            align-items: center;
            transition: all 0.3s ease;
        }

        .product-card:last-child {
            border-bottom: none;
        }

        @media (max-width: 500px) {
            .product-card {
                flex-direction: column;
                align-items: flex-start;
                padding: 25px 0;
            }
            .product-img { margin-bottom: 15px; }
            .quantity-selector { margin-top: 15px; width: 100%; justify-content: flex-start; }
        }

        .product-img {
            width: 85px;
            height: 85px;
            background-color: var(--bg-body);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin-right: 25px;
            flex-shrink: 0;
        }

        .product-info {
            flex-grow: 1;
            padding-right: 20px;
        }

        .product-title {
            font-family: 'Playfair Display', serif;
            font-size: 19px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 6px;
        }

        .product-desc {
            font-size: 14px;
            color: var(--text-light);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .product-price {
            font-size: 16px;
            color: var(--accent-rose);
            font-weight: 700;
        }

        /* 數量選擇器 (精品膠囊造型) */
        .quantity-selector {
            display: flex;
            align-items: center;
            background-color: var(--bg-body);
            border-radius: 30px;
            padding: 4px 6px;
        }

        .quantity-btn {
            width: 32px;
            height: 32px;
            background: transparent;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-weight: 400;
            font-size: 20px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            transition: background 0.2s;
        }

        .quantity-btn:hover { background: #D1C7BB; }

        .quantity-input {
            width: 36px;
            text-align: center;
            border: none;
            background: transparent;
            font-size: 15px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* 總結與付款 */
        .summary-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: transparent;
            padding: 20px 0;
            font-size: 16px;
            font-weight: 500;
            color: var(--text-light);
            border-bottom: 1px solid var(--border-soft);
            margin-bottom: 25px;
        }

        .summary-box span {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            color: var(--text-main);
            font-weight: 700;
        }

        #card-container {
            margin: 25px 0;
            min-height: 48px;
            padding: 14px 16px;
            border: 1px solid var(--border-soft);
            border-radius: 10px;
            background: var(--bg-body);
        }

        /* 結帳按鈕 (加深且顯眼) */
        .submit-btn {
            width: 100%;
            background-color: var(--text-main);
            color: white;
            border: none;
            padding: 18px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .submit-btn:hover { 
            background-color: var(--accent-rose);
            box-shadow: 0 8px 20px rgba(164, 76, 70, 0.3);
            transform: translateY(-2px);
        }

        /* 尚未選購商品時的按鈕顏色 (加深處理) */
        .submit-btn:disabled {
            background-color: #9C968F;
            color: #F5F1E7;
            box-shadow: none;
            cursor: not-allowed;
            transform: none;
        }

        footer {
            margin-top: 40px;
            text-align: center;
            font-size: 13px;
            color: var(--text-light);
            padding-bottom: 30px;
        }

        footer a {
            color: var(--text-main);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid var(--text-main);
            padding-bottom: 2px;
            transition: color 0.3s, border-color 0.3s;
        }

        footer a:hover {
            color: var(--accent-rose);
            border-color: var(--accent-rose);
        }

        #payment-status {
            margin-top: 25px;
            text-align: center;
            font-weight: 600;
            font-size: 15px;
        }
        
        .success-text { color: var(--text-main); }
        .error-text { color: var(--accent-rose); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Anderson <span>Spirit</span></h1>
        <div class="notice-box">
            <p class="highlight-text">📌 Orders close every Wednesday at 10:00 PM.</p>
            <p class="highlight-text">📦 Pick up at the school office on Fridays after school at 2:45 PM.</p>
        </div>
    </header>

    <form id="order-form">
        <section>
            <h2>Contact & Details</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label for="parent-name">Parent / Buyer Name</label>
                    <input type="text" id="parent-name" placeholder="e.g. Jerry Chan" required>
                </div>
                <div class="form-group">
                    <label for="parent-email">Email Address</label>
                    <input type="email" id="parent-email" placeholder="For receipt & updates" required>
                </div>
                <div class="form-group">
                    <label for="student-name">Student Full Name</label>
                    <input type="text" id="student-name" placeholder="e.g. Evan Chan" required>
                </div>
                <div class="form-group">
                    <label for="student-div">Student Class / Div</label>
                    <input type="text" id="student-div" placeholder="e.g. Div 5" required>
                </div>
            </div>
        </section>

        <section>
            <h2>Collection</h2>
            <div id="product-container" class="product-list">
                </div>
        </section>

        <section>
            <h2>Secure Checkout</h2>
            <div class="summary-box">
                Total Amount $<span id="total-amount">0.00</span>
            </div>
            <div id="card-container"></div>
            <button id="card-button" class="submit-btn" type="button" disabled>Place Order & Pay</button>
            <div id="payment-status"></div>
        </section>
    </form>

    <footer>
        <p>Question? Please email <a href="mailto:henryandersonfundraising@gmail.com">henryandersonfundraising@gmail.com</a></p>
    </footer>
</div>

<script>
    // ==========================================
    // 🛠️ 專屬商品設定區
    // ==========================================
    const PRODUCT_CATALOG = [
        {
            id: 'p1',
            title: 'Anderson Spirit Limited Edition T-Shirt',
            desc: '100% cotton, comfortable, and features our exclusive school spirit design.',
            price: 25.00,
            emoji: '👕'
        },
        {
            id: 'p2',
            title: 'Premium Hand-Drawn Sticker Pack',
            desc: 'Water-resistant, custom contour-cut. Perfect for water bottles and laptops.',
            price: 5.00,
            emoji: '✨'
        },
        {
            id: 'p3',
            title: 'Eco-Friendly Stainless Steel Tumbler',
            desc: 'Double-wall vacuum insulated for hot or cold drinks, with a carrying handle.',
            price: 20.00,
            emoji: '🥤'
        }
    ];

    const APPLICATION_ID = 'YOUR_SQUARE_APPLICATION_ID';
    const LOCATION_ID = 'YOUR_SQUARE_LOCATION_ID';
    const GOOGLE_APPS_SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_WEB_APP_URL';

    let totalPrice = 0;
    let orderItems = [];

    function renderProducts() {
        const container = document.getElementById('product-container');
        
        PRODUCT_CATALOG.forEach(item => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.setAttribute('data-id', item.id);
            card.setAttribute('data-title', item.title);
            card.setAttribute('data-price', item.price.toFixed(2));

            card.innerHTML = `
                <div class="product-img">${item.emoji}</div>
                <div class="product-info">
                    <div class="product-title">${item.title}</div>
                    <div class="product-desc">${item.desc}</div>
                    <div class="product-price">$${item.price.toFixed(2)}</div>
                </div>
                <div class="quantity-selector">
                    <button type="button" class="quantity-btn dec-btn">-</button>
                    <input type="text" class="quantity-input" value="0" readonly>
                    <button type="button" class="quantity-btn inc-btn">+</button>
                </div>
            `;
            container.appendChild(card);
        });

        attachQuantityEvents();
    }

    function attachQuantityEvents() {
        document.querySelectorAll('.product-card').forEach(card => {
            const incBtn = card.querySelector('.inc-btn');
            const decBtn = card.querySelector('.dec-btn');
            const qtyInput = card.querySelector('.quantity-input');

            incBtn.addEventListener('click', () => {
                qtyInput.value = parseInt(qtyInput.value) + 1;
                updateTotal();
            });

            decBtn.addEventListener('click', () => {
                let qty = parseInt(qtyInput.value);
                if (qty > 0) {
                    qtyInput.value = qty - 1;
                    updateTotal();
                }
            });
        });
    }

    function updateTotal() {
        totalPrice = 0;
        orderItems = [];
        
        document.querySelectorAll('.product-card').forEach(card => {
            const qty = parseInt(card.querySelector('.quantity-input').value);
            if (qty > 0) {
                const price = parseFloat(card.getAttribute('data-price'));
                const title = card.getAttribute('data-title');
                const id = card.getAttribute('data-id');
                
                totalPrice += price * qty;
                orderItems.push({ id, title, price, qty });
            }
        });

        document.getElementById('total-amount').innerText = totalPrice.toFixed(2);
        document.getElementById('card-button').disabled = (totalPrice <= 0);
    }

    async function initializeSquare() {
        if (!window.Square) {
            document.getElementById('payment-status').innerText = 'Failed to load payment module. Please check your connection.';
            return;
        }

        try {
            const payments = Square.payments(APPLICATION_ID, LOCATION_ID);
            const card = await payments.card();
            await card.attach('#card-container');

            const cardButton = document.getElementById('card-button');
            cardButton.addEventListener('click', async (event) => {
                event.preventDefault();
                
                const parentName = document.getElementById('parent-name').value;
                const parentEmail = document.getElementById('parent-email').value;
                const studentName = document.getElementById('student-name').value;
                const studentDiv = document.getElementById('student-div').value;

                if (!parentName || !parentEmail || !studentName || !studentDiv) {
                    alert('Please fill out all required contact and student information fields.');
                    return;
                }

                cardButton.disabled = true;
                const statusDiv = document.getElementById('payment-status');
                statusDiv.className = '';
                statusDiv.innerText = 'Establishing secure connection, please wait...';

                try {
                    const result = await card.tokenize();
                    if (result.status === 'OK') {
                        const token = result.token;
                        
                        const orderData = {
                            token: token,
                            parentName: parentName,
                            parentEmail: parentEmail,
                            studentName: studentName,
                            studentDiv: studentDiv,
                            totalAmount: totalPrice.toFixed(2),
                            items: orderItems
                        };

                        statusDiv.innerText = 'Processing authorization and recording your order...';

                        const response = await fetch(GOOGLE_APPS_SCRIPT_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(orderData)
                        });

                        statusDiv.className = 'success-text';
                        statusDiv.innerHTML = `🎉 Order Placed Successfully!<br>A confirmation email has been sent. Pick up your order this Friday at the main office at 2:45 PM.`;
                        document.querySelectorAll('.quantity-input').forEach(i => i.value = 0);
                        updateTotal();

                    } else {
                        statusDiv.className = 'error-text';
                        statusDiv.innerText = '❌ Card verification failed. Please check your card details.';
                        cardButton.disabled = false;
                    }
                } catch (e) {
                    console.error(e);
                    statusDiv.className = 'error-text';
                    statusDiv.innerText = 'An error occurred. Please try again or contact PAC.';
                    cardButton.disabled = false;
                }
            });

        } catch (e) {
            console.error('Square initialization error: ', e);
        }
    }

    renderProducts();
    initializeSquare();
</script>

</body>
</html>
