<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anderson Spirit - PAC Fundraising</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://sandbox.web.squarecdn.com/v1/square.js"></script>
    <style>
        :root { --bg-body: #DFD5C9; --bg-card: #F5F1E7; --text-main: #232A31; --accent-rose: #A44C46; --border-soft: #D1C7BB; }
        body { background-color: var(--bg-body); color: var(--text-main); padding: 40px 20px; font-family: 'Inter', sans-serif; line-height: 1.6; }
        .container { max-width: 850px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 40px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 40px; margin-bottom: 10px; }
        .notice { border: 1px solid var(--border-soft); padding: 20px; margin-bottom: 30px; font-weight: 700; text-transform: uppercase; font-size: 14px; }
        section { background: var(--bg-card); padding: 30px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; border: 1px solid var(--border-soft); border-radius: 8px; background: #EFEBE0; }
        .product-card { display: flex; align-items: center; border-bottom: 1px solid var(--border-soft); padding: 15px 0; }
        .product-img { width: 80px; height: 80px; background: #DFD5C9; border-radius: 8px; margin-right: 20px; overflow: hidden; flex-shrink: 0; }
        .summary { font-size: 20px; font-weight: 700; margin: 20px 0; }
        .submit-btn { width: 100%; padding: 15px; background: var(--text-main); color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: 700; }
        footer { text-align: center; margin-top: 30px; font-size: 14px; color: var(--text-main); }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Anderson <span>Spirit</span></h1>
        <div class="notice">
            <p>📌 Orders close every Wednesday at 10:00 PM.</p>
            <p>📦 Pick up at the school office on Fridays after school at 2:45 PM.</p>
        </div>
    </header>

    <form id="order-form">
        <section>
            <h2>Contact & Details</h2>
            <div class="form-grid">
                <input type="text" id="parent-name" placeholder="Parent Name" required>
                <input type="email" id="parent-email" placeholder="Email" required>
                <input type="text" id="student-name" placeholder="Student Full Name" required>
                <input type="text" id="student-div" placeholder="Student Class / Div" required>
            </div>
        </section>

        <section>
            <h2>Collection</h2>
            <div id="product-container">Loading...</div>
            <div class="summary">Total: $<span id="total-amount">0.00</span></div>
            <div id="card-container"></div>
            <button id="card-button" class="submit-btn" type="button" disabled>Place Order & Pay</button>
        </section>
    </form>

    <footer>
        <p>📫 Question? Please email: henryandersonfundraising@gmail.com</p>
    </footer>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz1AvO2BObufCfW2ENW5EoTnLaDfhRD60zb1Fl7B79ZX4Mt6uSBIyuRlLWTwmBcUZZV/exec';

    function getDriveImage(url) {
        if (url.includes('drive.google.com')) {
            let match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            if (match) return `https://drive.google.com/uc?export=view&id=${match[1]}`;
        }
        return url;
    }

    async function init() {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        const container = document.getElementById('product-container');
        container.innerHTML = '';
        data.products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.setAttribute('data-price', p.price);
            card.innerHTML = `
                <div class="product-img"><img src="${getDriveImage(p.image)}" style="width:100%;height:100%;object-fit:cover;"></div>
                <div style="flex-grow:1;">
                    <div style="font-weight:700;">${p.title}</div>
                    <div style="font-size:12px; color:#666;">${p.desc}</div>
                    <div style="color:var(--accent-rose);">$${p.price.toFixed(2)}</div>
                </div>
                <button type="button" class="dec">-</button>
                <input class="qty" value="0" style="width:30px; text-align:center; border:none; background:none;">
                <button type="button" class="inc">+</button>`;
            container.appendChild(card);
        });

        document.querySelectorAll('.inc').forEach(btn => btn.onclick = (e) => { e.target.previousElementSibling.value++; calc(); });
        document.querySelectorAll('.dec').forEach(btn => btn.onclick = (e) => { if(e.target.nextElementSibling.value > 0) e.target.nextElementSibling.value--; calc(); });
    }

    function calc() {
        let total = 0;
        document.querySelectorAll('.product-card').forEach(c => {
            total += parseInt(c.querySelector('.qty').value) * parseFloat(c.getAttribute('data-price'));
        });
        document.getElementById('total-amount').innerText = total.toFixed(2);
        document.getElementById('card-button').disabled = (total <= 0);
    }
    init();
</script>
</body>
</html>
