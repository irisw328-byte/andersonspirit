<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anderson Spirit - PAC Fundraising</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://sandbox.web.squarecdn.com/v1/square.js"></script>
    <style>
        :root {
            --bg-body: #DFD5C9;
            --bg-card: #F5F1E7;
            --text-main: #232A31;
            --text-light: #646C73;
            --accent-rose: #A44C46;
            --border-soft: #D1C7BB;
            --shadow-lux: 0 16px 40px rgba(35, 42, 49, 0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-body); color: var(--text-main); line-height: 1.6; padding: 40px 20px; }
        .container { max-width: 850px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 50px; }
        h1 { font-family: 'Playfair Display', serif; font-size: 42px; margin-bottom: 20px; }
        h1 span { font-style: italic; color: var(--accent-rose); }
        .notice-box { border-top: 1px solid var(--border-soft); border-bottom: 1px solid var(--border-soft); padding: 20px 0; margin-bottom: 30px; }
        section { background: var(--bg-card); padding: 40px; border-radius: 20px; box-shadow: var(--shadow-lux); margin-bottom: 40px; }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-light); text-transform: uppercase; }
        .form-group input { padding: 14px; border: 1px solid var(--border-soft); background-color: #EFEBE0; border-radius: 10px; }
        .product-card { display: flex; border-bottom: 1px solid var(--border-soft); padding: 20px 0; align-items: center; }
        .product-img { width: 90px; height: 90px; background: #DFD5C9; border-radius: 12px; margin-right: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .product-info { flex-grow: 1; }
        .product-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; }
        .quantity-selector { display: flex; align-items: center; background: #DFD5C9; border-radius: 30px; padding: 5px; }
        .quantity-btn { width: 30px; height: 30px; border: none; background: none; cursor: pointer; font-size: 18px; }
        .quantity-input { width: 30px; text-align: center; border: none; background: none; font-weight: 700; }
        .summary-box { font-size: 18px; font-weight: 600; margin: 20px 0; }
        .submit-btn { width: 100%; padding: 18px; background: var(--text-main); color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: 700; }
        .submit-btn:disabled { background: #9C968F; }
    </style>
</head>
<body>
<div class="container">
    <header><h1>Anderson <span>Spirit</span></h1><div class="notice-box"><p>📌 Orders close Wednesday 10PM. 📦 Pick up Friday 2:45PM.</p></div></header>
    <form id="order-form">
        <section>
            <h2>Contact & Details</h2>
            <div class="form-grid">
                <div class="form-group"><label>Parent Name</label><input type="text" id="parent-name" required></div>
                <div class="form-group"><label>Email</label><input type="email" id="parent-email" required></div>
                <div class="form-group"><label>Student Name</label><input type="text" id="student-name" required></div>
                <div class="form-group"><label>Class / Div</label><input type="text" id="student-div" required></div>
            </div>
        </section>
        <section>
            <h2>Collection</h2>
            <div id="product-container">Loading...</div>
        </section>
        <section>
            <h2>Secure Checkout</h2>
            <div class="summary-box">Total: $<span id="total-amount">0.00</span></div>
            <div id="card-container"></div>
            <button id="card-button" class="submit-btn" type="button" disabled>Place Order & Pay</button>
            <div id="payment-status"></div>
        </section>
    </form>
</div>

<script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbz1AvO2BObufCfW2ENW5EoTnLaDfhRD60zb1Fl7B79ZX4Mt6uSBIyuRlLWTwmBcUZZV/exec';
    const APP_ID = 'YOUR_SQUARE_APPLICATION_ID';
    const LOC_ID = 'YOUR_SQUARE_LOCATION_ID';

    // 關鍵轉譯器
    function getDriveImage(url) {
        if (url.includes('drive.google.com')) {
            let match = url.match(/\/d\/([a-zA-Z0-9_-]+)/);
            if (match) return `https://drive.google.com/uc?export=view&id=${match[1]}`;
        }
        return url;
    }

    async function init() {
        const res = await fetch(SCRIPT_URL);
        const data = await res.json();
        const container = document.getElementById('product-container');
        container.innerHTML = '';
        data.products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            card.innerHTML = `
                <div class="product-img"><img src="${getDriveImage(p.image)}" style="width:100%;height:100%;object-fit:cover;"></div>
                <div class="product-info">
                    <div class="product-title">${p.title}</div>
                    <div class="product-price">$${p.price.toFixed(2)}</div>
                </div>
                <div class="quantity-selector">
                    <button class="quantity-btn dec">-</button>
                    <input class="quantity-input" value="0" readonly>
                    <button class="quantity-btn inc">+</button>
                </div>`;
            container.appendChild(card);
        });
        
        document.querySelectorAll('.inc').forEach(btn => btn.onclick = () => { btn.previousElementSibling.value++; calc(); });
        document.querySelectorAll('.dec').forEach(btn => btn.onclick = () => { if(btn.nextElementSibling.value > 0) btn.nextElementSibling.value--; calc(); });
    }

    function calc() {
        let total = 0;
        document.querySelectorAll('.product-card').forEach(c => {
            const qty = parseInt(c.querySelector('.quantity-input').value);
            const price = parseFloat(c.querySelector('.product-price').innerText.replace('$',''));
            total += qty * price;
        });
        document.getElementById('total-amount').innerText = total.toFixed(2);
        document.getElementById('card-button').disabled = (total <= 0);
    }

    init();
</script>
</body>
</html>
