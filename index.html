<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anderson Spirit</title>
    <style>
        :root { --bg-body: #DFD5C9; --bg-card: #F5F1E7; --text-main: #232A31; }
        body { background: var(--bg-body); color: var(--text-main); padding: 40px 20px; font-family: sans-serif; }
        .container { max-width: 850px; margin: auto; }
        section { background: var(--bg-card); padding: 30px; border-radius: 15px; margin-bottom: 20px; }
        .product-card { display: flex; align-items: center; border-bottom: 1px solid #ccc; padding: 15px 0; }
    </style>
</head>
<body>
<div class="container">
    <section>
        <h2>Collection</h2>
        <div id="product-container">Loading...</div>
    </section>
</div>

<script>
    // ⚠️ 請務必把這行連結換成您剛剛從「管理部署」複製出來的最新的那個 URL
    const SCRIPT_URL = '貼上您最新的 Web App URL';

    async function load() {
        const container = document.getElementById('product-container');
        try {
            const res = await fetch(SCRIPT_URL);
            // 檢查是否取得資料
            if (!res.ok) throw new Error('伺服器連線失敗');
            const data = await res.json();
            
            if (!data.products || data.products.length === 0) {
                container.innerHTML = "目前沒有商品資料，請檢查試算表 Product 頁面是否填寫正確。";
                return;
            }

            container.innerHTML = '';
            data.products.forEach(p => {
                const div = document.createElement('div');
                div.className = 'product-card';
                div.innerHTML = `<div>${p.title} - $${p.price}</div>`;
                container.appendChild(div);
            });
        } catch(e) {
            container.innerHTML = "錯誤：" + e.message + "。請確認 SCRIPT_URL 是否正確且已設為「所有人」存取。";
        }
    }
    load();
</script>
</body>
</html>
